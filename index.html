        #user-info { font-weight: bold; }
        button { margin: 5px 0; padding: 10px 15px; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background-color: #f0f0f0; font-size: 14px; }
        button:hover { background-color: #e0e0e0; }
        input, select { box-sizing: border-box; padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 100%; margin-bottom: 10px; font-size: 14px; }
        .book-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border: 1px solid #eee; margin-top: 8px; border-radius: 8px; }

        .delete-btn { color: red; cursor: pointer; border: none; background: none; font-size: 1.1em; padding: 0 8px; }
        .cash-in { color: #28a745; font-weight: bold; }
        .cash-out { color: #dc3545; font-weight: bold; }
        #summary { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; background-color: #fafafa; display: flex; justify-content: space-between; }

        th { background-color: #f2f2f2; }
        .balance-badge { padding: 6px 10px; border-radius: 8px; font-weight: bold; }
        .balance-positive { background: #e6ffec; color: #0b7a3a; border: 1px solid #c8f1d1; }
        .balance-negative { background: #fff0f0; color: #a00; border: 1px solid #f2c7c7; }

        // === Local backup helpers ===
        function saveToLocalBackup() {
            try {
                localStorage.setItem('vc_allData', JSON.stringify(allData || {}));
                if (dataFileId) localStorage.setItem('vc_dataFileId', dataFileId);
            } catch (e) { console.warn('Local backup fail', e); }
        }


        const BOOK_META_KEY = '__bookMeta';

        function nowIso() { return new Date().toISOString(); }

        function getBookMetaStore(data = allData) {
          if (!data[BOOK_META_KEY] || typeof data[BOOK_META_KEY] !== 'object' || Array.isArray(data[BOOK_META_KEY])) {
            data[BOOK_META_KEY] = { books: {} };
          }
          if (!data[BOOK_META_KEY].books || typeof data[BOOK_META_KEY].books !== 'object') {
            data[BOOK_META_KEY].books = {};
          }
          return data[BOOK_META_KEY].books;
        }

        function getBookNames(data = allData) {
          return Object.keys(data || {}).filter(name => name !== BOOK_META_KEY && Array.isArray(data[name]));
        }

        function inferBookModifiedAt(entries) {
          const times = (entries || []).map(e => new Date(e.updatedAt || e.date || 0).getTime()).filter(Number.isFinite);
          return times.length ? new Date(Math.max(...times)).toISOString() : nowIso();
        }

        function ensureBookModifiedAt(book, data = allData) {
          if (!Array.isArray(data[book])) return null;
          const meta = getBookMetaStore(data);
          if (!meta[book] || typeof meta[book] !== 'object') meta[book] = {};
          if (!meta[book].modifiedAt) meta[book].modifiedAt = inferBookModifiedAt(data[book]);
          return meta[book].modifiedAt;
        }

        function touchBook(book, data = allData, timestamp = nowIso()) {
          if (!Array.isArray(data[book])) return timestamp;
          const meta = getBookMetaStore(data);
          if (!meta[book] || typeof meta[book] !== 'object') meta[book] = {};
          meta[book].modifiedAt = timestamp;
          return timestamp;
        }

        function normalizeData(data) {
          if (!data || typeof data !== 'object' || Array.isArray(data)) return {};
          const out = {};
          Object.keys(data).forEach(book => {
            if (book === BOOK_META_KEY || deletedBookNames.has(book)) return;
            if (!Array.isArray(data[book])) return;
            out[book] = data[book].filter(e => e && typeof e === 'object' && !deletedEntryIds.has(String(e.id))).map(e => ({
              id: e.id || Date.now()+Math.random(),
              date: e.date || new Date().toISOString().slice(0,16).replace('T',' '),
              remark: String(e.remark || ''),
              mode: e.mode || 'Cash',
              amount: Number(e.amount) || 0,
              type: e.type === 'out' ? 'out' : 'in',
              updatedAt: e.updatedAt || new Date().toISOString()
            }));
          });

          const sourceMeta = data[BOOK_META_KEY] && typeof data[BOOK_META_KEY] === 'object' ? data[BOOK_META_KEY].books || {} : {};
          const outMeta = getBookMetaStore(out);
          getBookNames(out).forEach(book => {
            const sourceModifiedAt = sourceMeta[book] && sourceMeta[book].modifiedAt;
            outMeta[book] = { modifiedAt: sourceModifiedAt || inferBookModifiedAt(out[book]) };
          });
          return out;
        }

        function mergeData(local, remote) {
          const normalizedLocal = normalizeData(local);
          const normalizedRemote = normalizeData(remote);
          const merged = normalizeData(normalizedLocal);
          const localMeta = getBookMetaStore(normalizedLocal);
          const remoteMeta = getBookMetaStore(normalizedRemote);
          const mergedMeta = getBookMetaStore(merged);

          new Set([...getBookNames(normalizedLocal), ...getBookNames(normalizedRemote)]).forEach(book => {
            if (deletedBookNames.has(book)) return;
            const localHasBook = Array.isArray(normalizedLocal[book]);
            const remoteHasBook = Array.isArray(normalizedRemote[book]);
            const localModified = new Date((localMeta[book] && localMeta[book].modifiedAt) || inferBookModifiedAt(normalizedLocal[book] || [])).getTime();
            const remoteModified = new Date((remoteMeta[book] && remoteMeta[book].modifiedAt) || inferBookModifiedAt(normalizedRemote[book] || [])).getTime();

            if (!localHasBook && remoteHasBook) {
              merged[book] = normalizedRemote[book].slice();
              mergedMeta[book] = { modifiedAt: new Date(remoteModified).toISOString() };
              return;
            }
            if (!remoteHasBook) {
              merged[book] = normalizedLocal[book].slice();
              mergedMeta[book] = { modifiedAt: new Date(localModified).toISOString() };
              return;
            }

            const winner = remoteModified > localModified ? normalizedRemote : normalizedLocal;
            merged[book] = winner[book].slice();
            mergedMeta[book] = { modifiedAt: new Date(Math.max(localModified, remoteModified)).toISOString() };
          });
          return merged;
        }
        function loadFromLocalBackup() {
            try {
                const t = localStorage.getItem('vc_allData');
                const id = localStorage.getItem('vc_dataFileId');
                if (t) allData = normalizeData(JSON.parse(t));
                getBookNames(allData).forEach(name => ensureBookModifiedAt(name));
                if (id) dataFileId = id;
            } catch (e) { console.warn('Local load fail', e); }
        }
        loadFromLocalBackup();

        // === Google Sign-in & Drive init ===

          google.accounts.id.initialize({
            client_id: CLIENT_ID,

          });
          google.accounts.id.renderButton(gIdSignin, {
            theme: 'outline', size: 'large'
          });
          google.accounts.id.prompt();

          // show local data if present while Google auth completes

            userInfo.style.display = 'block';
            userInfo.textContent = 'Signed in (local data)';
            gIdSignin.style.display = 'none';
            signoutButton.style.display = 'block';
            appContainer.style.display = 'block';
            renderBookList();
          }
        };

        function handleCredentialResponse(response) {
          // initialize token client to get OAuth token for Drive
          tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (tokenResponse) => {
              if (tokenResponse.error) {
                console.warn('Token error', tokenResponse);
                return;
              }
              accessToken = tokenResponse.access_token;
              if (accessToken) {
                gapi.load('client', initGapi);
              }
            }
          });
          // request an access token immediately
          tokenClient.requestAccessToken();
        }

        function initGapi() {
         gapi.client.init({
    discoveryDocs: [
        "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"
    ]
}).then(() => {
            gapi.client.setToken({ access_token: accessToken });
            userInfo.style.display = 'block';
            userInfo.textContent = 'Signed in';
            signoutButton.style.display = 'block';
            gIdSignin.style.display = 'none';
            appContainer.style.display = 'block';
            findOrCreateFile();
            renderBookList();
          }).catch(err => console.warn('GAPI init error', err));
        }

        signoutButton.onclick = () => {
          accessToken = null;
          google.accounts.id.disableAutoSelect();
          gIdSignin.style.display = 'block';
          signoutButton.style.display = 'none';
          userInfo.style.display = 'none';
          appContainer.style.display = 'none';
          saveToLocalBackup();
        };

        // === Drive file helpers ===

        // Find existing file or create new one
        function findOrCreateFile() {
          if (!accessToken) {
            renderBookList();
            return;
          }
          // Always search latest file on Drive
gapi.client.drive.files.list({
    q: `name='${DATA_FILENAME}' and trashed=false`,
    fields: 'files(id,name,modifiedTime)'
})
.then(res => {

    console.log("Drive List Response:", res);

    if (
        res.result &&
        Array.isArray(res.result.files) &&

    ) {

        localStorage.setItem("vc_dataFileId", dataFileId);

            localStorage.setItem(
                "vc_driveModifiedTime",
                res.result.files[0].modifiedTime
            );
        }

        readFileAndMaybeSync(dataFileId);

  } else {

    createFile()
    .then(() => {
        saveToLocalBackup();
        renderBookList();
    })
        .catch(console.error);

}

})
.catch(err => {

    console.warn("Drive list error", err);

    renderBookList();

});
        }

        async function createFile() {
        return gapi.client.drive.files.create({
    resource: {
        name: DATA_FILENAME,
        mimeType: 'application/json'
    },
    fields: 'id,modifiedTime'
})
.then(async (res) => {

    dataFileId = res.result.id;

    localStorage.setItem("vc_dataFileId", dataFileId);

    if (res.result.modifiedTime) {
        localStorage.setItem(
            "vc_driveModifiedTime",
            res.result.modifiedTime
        );
    }

    saveToLocalBackup();

await uploadFile(JSON.stringify(allData || {}));

return dataFileId;

})
.catch(err => {
    console.error("Drive create error", err);

    throw err;

});
        }

        // read file metadata then decide whether to download or keep local
        function readFileAndMaybeSync(fileId) {
          if (!accessToken) { renderBookList(); return; }
          // get metadata first
          gapi.client.drive.files.get({ fileId, fields: 'id, name, modifiedTime' })
            .then(metaRes => {
              const driveModified = metaRes.result.modifiedTime;
              const localDriveModified = localStorage.getItem('vc_driveModifiedTime');
              // if drive has a newer version than local, download; else keep local and upload
              if (!localDriveModified || new Date(driveModified) > new Date(localDriveModified)) {

    readFile(fileId);

} else {

    saveDataFile().catch(console.error);

    renderBookList();

}
            }).catch(async err => {

    console.warn('Drive metadata read error', err);

    // Agar file delete ho gayi hai to nayi file banao
    if (err.status === 404 || (err.result && err.result.error && err.result.error.code === 404)) {

        localStorage.removeItem("vc_dataFileId");
        localStorage.removeItem("vc_driveModifiedTime");

        dataFileId = null;

        await createFile();

        renderBookList();

        return;
    }

    readFile(fileId);

});
        }

        function readFile(fileId) {
          gapi.client.drive.files.get({ fileId, alt: 'media' }).then(res => {
            try {
              // gapi returns parsed object in res.result
              const remote = res.result || {};
              // If remote is an object with the same structure, adopt it
              if (remote && typeof remote === 'object') {
                allData = mergeData(allData, remote);
                saveToLocalBackup();
                // update local drive modified time by fetching metadata
                gapi.client.drive.files.get({ fileId, fields: 'modifiedTime' }).then(m => {
                  if (m.result && m.result.modifiedTime) localStorage.setItem('vc_driveModifiedTime', m.result.modifiedTime);
                }).catch(()=>{});
              }
            } catch (e) {
              console.warn('Read parse error', e);
            }
            renderBookList();
          }).catch(err => {
            console.warn('Drive read error', err);
            renderBookList();
          });
        }

        // upload JSON content to Drive using uploadType=media (PATCH)
        async function uploadFile(content) {
          if (!accessToken || !dataFileId) return;
          try {
            console.log("UPLOAD content =", content);
            const blob = new Blob([content], { type: 'application/json' });
            const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${dataFileId}?uploadType=media&fields=id,modifiedTime`, {
              method: 'PATCH',
              headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
              body: blob
            });
            if (res.ok) {
              console.log('[sync] Upload success', { fileId: dataFileId });
              const json = await res.json().catch(()=>null);
              if (json && json.modifiedTime) localStorage.setItem('vc_driveModifiedTime', json.modifiedTime);
            } else {
              const errorText = await res.text();
              console.warn('Drive upload non-ok', res.status, errorText);
              throw new Error(`Drive upload failed: ${res.status} ${errorText}`);
            }
          } catch(err){

console.error(err);

throw err;

}
        }

}

if (!dataFileId) {

}

    alert(
        "Sync Failed!\n\n" +
        (err.message || "Unknown Error") +
        "\n\nF12 → Console me exact error dekh sakte ho."
    );

}
        }

        // auto-download latest from Drive (used on focus)
        async function autoSyncFromDrive() {
          if (!accessToken || !dataFileId) return;
          try {
            // check metadata
            const meta = await gapi.client.drive.files.get({ fileId: dataFileId, fields: 'modifiedTime' });
            const driveModified = meta.result.modifiedTime;
            const localDriveModified = localStorage.getItem('vc_driveModifiedTime');
            if (!localDriveModified || new Date(driveModified) > new Date(localDriveModified)) {
              const res = await gapi.client.drive.files.get({ fileId: dataFileId, alt: 'media' });
              allData = mergeData(allData, res.result || {});
              saveToLocalBackup();
              renderBookList();
              if (currentBookName) renderEntries();
              console.log('Auto-downloaded and merged latest data from Drive.');
            } else {
              // local is newer — push local
              await saveDataFile();
              console.log('Local data newer — uploaded to Drive.');
            }
          } catch (err) {
            console.warn('Auto-sync from drive failed', err);
          }
        }

        // auto-upload after every change (call saveDataFile)
        async function autoSyncToDriveAfterChange() {
          if (!accessToken || !dataFileId) return;
          try {
            await saveDataFile();
            console.log('Auto-upload done.');
          } catch (err) {
            console.warn('Auto-upload failed', err);
          }
        }

        // run sync on window focus so mobile/laptop pick up latest
        window.addEventListener('focus', () => {
          if (accessToken && dataFileId) autoSyncFromDrive();
        });

        // optional periodic sync (conservative interval)
        setInterval(async () => {

    if (document.hidden) return;

    if (accessToken && dataFileId) {
        await autoSyncFromDrive();
    }

}, 60000); // every 60s

        // === UI & entries logic ===
        function showScreen(s) { homeScreen.style.display = s==='home'?'block':'none'; detailsScreen.style.display = s==='details'?'block':'none'; }
        function showDetailsScreen(name) {
          currentBookName = name;
          bookTitle.textContent = name;
          const now = new Date();
          dateInput.value = now.toISOString().slice(0,10);
          timeInput.value = now.toTimeString().slice(0,5);
          renderEntries();
          showScreen('details');
        }

        backButton.onclick = () => {
          editingEntryId = null;
          showScreen('home');
          renderBookList();
        };

        function computeBookTotals(name) {
          const arr = allData[name] || [];
          let ti = 0, to = 0;
          arr.forEach(e => {
            if (e.type === 'in') ti += +e.amount;
            else to += +e.amount;
          });
          return { totalIn: ti, totalOut: to, net: ti - to };
        }

        function renderBookList() {
          bookList.innerHTML = '';
          getBookNames(allData).forEach(name => ensureBookModifiedAt(name));
          getBookNames(allData).sort((a, b) => new Date(ensureBookModifiedAt(b)) - new Date(ensureBookModifiedAt(a))).forEach(name => {
            const div = document.createElement('div');
            div.className = 'book-item';
            const span = document.createElement('div');
            span.className = 'book-name';
            span.onclick = () => showDetailsScreen(name);

            const title = document.createElement('span');
            title.textContent = name;

            const totals = computeBookTotals(name);
            const badge = document.createElement('span');
            badge.className = 'balance-badge '+(totals.net>=0?'balance-positive':'balance-negative');
            badge.textContent = (totals.net>=0?'+ ':'- ')+Math.abs(totals.net).toFixed(2);
            badge.title = 'Net balance';

            span.append(title, badge);

            const delBtn = document.createElement('button');
            delBtn.textContent = 'Delete';
            delBtn.className = 'book-delete-btn';
            delBtn.onclick = (e) => {
              e.stopPropagation();
              const confirmDel = prompt(`Type the book name "${name}" to confirm deletion:`);
              if (confirmDel === name) {
                delete allData[name];
                deletedBookNames.add(name);
                saveDeletionMarkers();
                saveToLocalBackup();
                autoSyncToDriveAfterChange();
                renderBookList();
                alert(`Book "${name}" deleted.`);
              } else {
                alert('Deletion cancelled.');
              }
            };

            div.append(span, delBtn);
            bookList.append(div);
          });
          if (getBookNames(allData).length === 0) {
            bookList.innerHTML = '<div style="margin-top:12px;color:#666;">No cashbooks yet. Create one above to start tracking.</div>';
          }
        }

        addBookForm.onsubmit = e => {
          e.preventDefault();
          const n = newBookNameInput.value.trim();
          if (n && !allData[n]) {
            allData[n] = [];
            touchBook(n);
            newBookNameInput.value = '';
            renderBookList();
            saveToLocalBackup();
            autoSyncToDriveAfterChange();
          } else {
            alert('Book name already exists or is invalid.');
          }
        };

        function addEntry(type) {
          const a = parseFloat(amountInput.value);
          if (!currentBookName) return alert('Select a book first.');
          if (isNaN(a) || a <= 0) return alert('Enter a valid amount.');
          if (!remarkInput.value.trim()) return alert('Enter remark.');
          const d = dateInput.value || new Date().toISOString().slice(0,10);
          const t = timeInput.value || new Date().toTimeString().slice(0,5);
          const entry = { id: Date.now()+Math.random(), date:`${d} ${t}`, remark: remarkInput.value.trim(), mode: modeInput.value, amount: a, type, updatedAt: new Date().toISOString() };
          allData[currentBookName].push(entry);
          touchBook(currentBookName);
          renderEntries();
          saveToLocalBackup();
          autoSyncToDriveAfterChange();
          amountInput.value = '';
          remarkInput.value = '';
        }

        cashInButton.onclick = () => addEntry('in');
        cashOutButton.onclick = () => addEntry('out');
        searchInput.oninput = renderEntries;

        renameBookButton.onclick = () => {
          if (!currentBookName) return;
          const nextName = prompt('Enter new book name:', currentBookName);
          const cleanName = (nextName || '').trim();
          if (!cleanName || cleanName === currentBookName) return;
          if (allData[cleanName]) return alert('A book with that name already exists.');
          allData[cleanName] = allData[currentBookName];
          const renameTime = nowIso();
          touchBook(cleanName, allData, renameTime);
          deletedBookNames.add(currentBookName);
          saveDeletionMarkers();
          delete allData[currentBookName];
          currentBookName = cleanName;
          bookTitle.textContent = cleanName;
          saveToLocalBackup();
          autoSyncToDriveAfterChange();
          renderEntries();
        };

        syncNowButton.onclick = syncNow;
        localBackupButton.onclick = () => {
          saveToLocalBackup();
          const blob = new Blob([JSON.stringify(allData || {}, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `vishclick-backup-${new Date().toISOString().slice(0,10)}.json`;
          a.click();
          URL.revokeObjectURL(url);
        };
        restoreBackupButton.onclick = () => restoreBackupInput.click();
        restoreBackupInput.onchange = async () => {
          const file = restoreBackupInput.files && restoreBackupInput.files[0];
          if (!file) return;
          try {
            const restored = JSON.parse(await file.text());
            allData = mergeData(allData, restored);
            getBookNames(restored).forEach(name => { if (allData[name]) touchBook(name); });
            saveToLocalBackup();
            await autoSyncToDriveAfterChange();
            renderBookList();
            if (currentBookName) renderEntries();
            alert('Backup restored and merged.');
          } catch (err) {
            console.warn('Restore failed', err);
            alert('Restore failed. Select a valid VishClick JSON backup.');
          } finally {
            restoreBackupInput.value = '';
          }
        };

        // === FIXED renderEntries with correct running balances ===
        function renderEntries() {
          if (!currentBookName) return;
          const arr = allData[currentBookName] || [];
          const query = (searchInput.value || '').trim().toLowerCase();

          // Sort oldest → newest for balance calculation
          const sortedAsc = arr.slice().sort((a, b) => new Date(a.date) - new Date(b.date));

          let run = 0, ti = 0, to = 0;
          const runningBalances = {};

          for (let e of sortedAsc) {
            if (e.type === 'in') { run += +e.amount; ti += +e.amount; }
            else { run -= +e.amount; to += +e.amount; }
            runningBalances[e.id] = run.toFixed(2);
          }

          // Now display latest → oldest
          const sortedDesc = sortedAsc.slice().reverse().filter(e => !query || [e.date, e.remark, e.mode, e.type, String(e.amount)].some(v => String(v || '').toLowerCase().includes(query)));
          entryList.innerHTML = '';

          for (let e of sortedDesc) {
            const row = entryList.insertRow();
            row.insertCell(0).textContent = new Date(e.date).toLocaleString();
            row.insertCell(1).textContent = e.remark;
            row.insertCell(2).textContent = e.mode;

            const ci = row.insertCell(3);
            const co = row.insertCell(4);
            if (e.type === 'in') {
              ci.textContent = (+e.amount).toFixed(2);
              ci.className = 'cash-in';
              co.textContent = '-';
            } else {
              co.textContent = (+e.amount).toFixed(2);
              co.className = 'cash-out';
              ci.textContent = '-';
            }

            const balCell = row.insertCell(5);
            balCell.textContent = runningBalances[e.id] || '0.00';
            // style based on numeric value
            if (parseFloat(runningBalances[e.id] || 0) >= 0) balCell.className = 'balance-positive';
            else balCell.className = 'balance-negative';

            const act = row.insertCell(6);
            const eb = document.createElement('button');
            eb.textContent = 'Edit';
            eb.className = 'small';
            eb.onclick = () => openEditModal(e.id);

            const db = document.createElement('button');
            db.textContent = 'X';
            db.className = 'delete-btn';
            db.onclick = () => {
              if (confirm('Delete this entry?')) {
                const idx = allData[currentBookName].findIndex(x=>x.id===e.id);
                if (idx > -1) {
                  deletedEntryIds.add(String(e.id));
                  saveDeletionMarkers();
                  allData[currentBookName].splice(idx,1);
                  touchBook(currentBookName);
                  renderEntries();
                  saveToLocalBackup();
                  autoSyncToDriveAfterChange();
                }
              }
            };
            act.append(eb, db);
          }

          totalInDisplay.textContent = ti.toFixed(2);
          totalOutDisplay.textContent = to.toFixed(2);
          netBalanceDisplay.textContent = (ti - to).toFixed(2);
          renderBookList();
        }

        function openEditModal(id) {
          const e = (allData[currentBookName]||[]).find(x=>x.id===id);
          if (!e) return alert('Entry not found');
          editingEntryId = id;
          const parts = e.date.split(' ');
          editDate.value = parts[0];
          editTime.value = parts[1] || '00:00';
          editMode.value = e.mode;
          editAmount.value = e.amount;
          editRemark.value = e.remark;
          editModal.style.display = 'flex';
        }
        cancelEdit.onclick = () => { editingEntryId = null; editModal.style.display = 'none'; };
        saveEdit.onclick = () => {
          if (!editingEntryId) return;
          const a = parseFloat(editAmount.value);
          if (isNaN(a) || a <= 0) return alert('Enter valid amount.');
          if (!editRemark.value.trim()) return alert('Enter remark.');
          const e = (allData[currentBookName]||[]).find(x=>x.id===editingEntryId);
          if (!e) return alert('Entry not found');
          e.date = `${editDate.value} ${editTime.value}`;
          e.mode = editMode.value;
          e.amount = a;
          e.remark = editRemark.value.trim();
          e.updatedAt = new Date().toISOString();
          touchBook(currentBookName, allData, e.updatedAt);
          editingEntryId = null;
          editModal.style.display = 'none';
          renderEntries();
          saveToLocalBackup();
          autoSyncToDriveAfterChange();
        };

        // Export PDF logic
        exportPdfButton.onclick = () => {
          const arr = allData[currentBookName] || [];
          if (!arr.length) return alert('No entries to export!');
          const sorted = arr.slice().sort((a,b) => new Date(a.date) - new Date(b.date));
          let run=0, ti=0, to=0;
          const rows = sorted.map(e => {
            if (e.type==='in') { ti += +e.amount; run += +e.amount; }
            else { to += +e.amount; run -= +e.amount; }
            return {
              date: new Date(e.date).toLocaleString(),
              remark: e.remark,
              mode: e.mode,
              cashIn: e.type==='in'?e.amount.toFixed(2):'-',
              cashOut: e.type==='out'?e.amount.toFixed(2):'-',
              balance: run.toFixed(2)
            };
          });
          const body = rows.slice().reverse().map(r => [r.date,r.remark,r.mode,r.cashIn,r.cashOut,r.balance]);
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF('p','mm','a4');
          doc.setFont('helvetica');
          const pageWidth = doc.internal.pageSize.getWidth();
          const margin = 10;
          doc.setFillColor(0,38,77); doc.rect(0,0,pageWidth,12,'F');
          doc.setTextColor(255,255,255); doc.setFontSize(16);
          doc.text("VishClick : Design Studio", pageWidth/2, 8, { align: 'center' });
          doc.setFillColor(230,230,250); doc.rect(0,12,pageWidth,10,'F');
          doc.setTextColor(0); doc.setFontSize(12); doc.setFont(undefined,'bold');
          doc.text(`Book: ${currentBookName}`, pageWidth/2, 19, { align: 'center' });
          const totalWidth=60, gap=5, totalsY=30, totalStartX=20;
          doc.setFontSize(9); doc.setFont(undefined,'bold');
          doc.setFillColor(220,255,220); doc.rect(totalStartX, totalsY, totalWidth,8,'F');
          doc.setTextColor(0,128,0); doc.text(`Total In: ${ti.toFixed(2)}`, totalStartX+3, totalsY+6);
          doc.setFillColor(255,220,220); doc.rect(totalStartX+totalWidth+gap, totalsY, totalWidth,8,'F');
          doc.setTextColor(220,0,0); doc.text(`Total Out: ${to.toFixed(2)}`, totalStartX+totalWidth+gap+3, totalsY+6);
          doc.setFillColor(220,220,255); doc.rect(totalStartX+(totalWidth+gap)*2, totalsY, totalWidth,8,'F');
          doc.setTextColor(75,0,130); doc.text(`Net Balance: ${(ti-to).toFixed(2)}`, totalStartX+(totalWidth+gap)*2+3, totalsY+6);
          doc.autoTable({
            head:[['Date','Remark','Mode','Cash In','Cash Out','Balance']],
            body: body,
            startY: totalsY+14,
            margin:{left: margin, right: margin},
            styles:{fontSize:9,cellPadding:2.5},
            headStyles:{fillColor:[41,128,185], textColor:255, halign:'center'},
            columnStyles:{0:{cellWidth:35},1:{cellWidth:'auto'},2:{cellWidth:20, halign:'center'},
              3:{cellWidth:22,halign:'right',textColor:[0,128,0]},
              4:{cellWidth:22,halign:'right',textColor:[220,0,0]},
              5:{cellWidth:22,halign:'right'}
            },
            theme:'grid'
          });
          doc.save(`${currentBookName}-report.pdf`);
        };
    </script>
